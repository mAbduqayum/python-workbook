name: Grade Calculator

on:
  push:
    branches: [solutions]
  workflow_dispatch:


jobs:
  calculate-grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.22"

      - name: Install dependencies
        run: |
          uv sync

      - name: Run tests for all modules
        run: |
          uv run pytest -n auto
